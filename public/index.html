<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MANDUBO – تسجيل الدخول</title>
  <script src="/config.js"></script>
  <script src="/assets/js/i18n.js"></script>
  <script>i18n.init();i18n.apply();</script>
  <style>
    :root{ --brand:#0F73FF; --brand-600:#0d63dd; }
    body{font-family:"Tajawal",system-ui,-apple-system,"Segoe UI",sans-serif;background:#f3f5f9;margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
    .card{background:#fff;max-width:420px;width:100%;padding:28px 26px;border-radius:20px;box-shadow:0 18px 48px rgba(15,115,255,0.08);}
    h1{margin:0 0 6px;font-size:24px;color:#111;text-align:center;}
    p.hint{margin:0 0 18px;color:#5b6574;text-align:center;font-size:14px;}
    label{display:block;margin-bottom:6px;font-size:13px;color:#495260;font-weight:600;}
    input{width:100%;padding:12px 14px;border-radius:12px;border:1px solid #d0d7e2;font-size:15px;box-sizing:border-box;}
    input:focus{outline:2px solid rgba(15,115,255,0.35);outline-offset:1px;}
    button{width:100%;padding:12px 14px;border-radius:12px;font-size:15px;font-weight:600;border:1px solid transparent;cursor:pointer;transition:all .2s ease;}
    .btn-brand{background:var(--brand);color:#fff;border-color:var(--brand);}
    .btn-brand:hover{background:var(--brand-600);}
    .btn-muted{background:#fff;border-color:#cfd6e3;color:var(--brand);}
    .btn-muted:hover{background:rgba(15,115,255,0.06);}
    .actions{display:grid;gap:12px;margin-top:18px;}
    .roles{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:20px;}
    .brand{color:var(--brand);}    
    a{color:var(--brand);text-decoration:none;font-size:13px;}
    a:hover{text-decoration:underline;}
    #step-password,#step-otp{display:none;}
  </style>
</head>
<body>
  <main class="card">
    <h2 class="brand" style="text-align:center;margin:10px 0">MANDUBO</h2>
    <p class="hint">أدخل رقم هاتفك للمتابعة.</p>

    <label for="phone">رقم الجوال</label>
    <input id="phone" type="tel" placeholder="مثال: 01012345678" autocomplete="tel" />
    <button id="btnNext" class="btn-brand" style="margin-top:14px">متابعة</button>

    <div id="step-password" class="actions">
      <div>
        <label for="pwd">كلمة المرور</label>
        <input id="pwd" type="password" placeholder="أدخل كلمة المرور" autocomplete="current-password" />
      </div>
      <button id="btnLogin" class="btn-brand">تسجيل الدخول</button>
      <button id="lnkForgot" type="button" class="btn-muted">نسيت كلمة المرور؟</button>
    </div>

    <div id="step-otp" class="actions">
      <div>
        <label for="otp">رمز التحقق (OTP)</label>
        <input id="otp" inputmode="numeric" placeholder="____" autocomplete="one-time-code" />
      </div>
      <button id="btnVerify" class="btn-brand">تأكيد الرمز</button>
      <p style="font-size:13px;color:#5b6574;text-align:center">أرسلنا رمز تحقق صالح لمدة 5 دقائق.</p>
    </div>

    <div class="roles">
      <button id="driverBtn" class="btn-muted">أنا مندوب</button>
      <button id="adminBtn" class="btn-muted">لوحة المشرف</button>
    </div>
  </main>

  <style>
    .dev-menu{position:fixed;right:12px;bottom:12px;z-index:99999;background:#111;color:#fff;padding:10px 12px;border-radius:12px;font:14px system-ui;opacity:.75}
    .dev-menu:hover{opacity:1}
    .dev-menu a{color:#9ad;margin:0 6px;text-decoration:none}
    .dev-menu .btn{border:1px solid #444;background:#222;color:#fff;padding:4px 8px;border-radius:8px;cursor:pointer}
  </style>
  <div class="dev-menu" id="devMenu" style="display:none">
    <b>Dev</b> · <a href="/index.html">Home</a> | <a href="/delivery_app.html">Customer</a> | <a href="/driver_app.html">Driver</a> | <a href="/admin_panel.html">Admin</a> | <a href="/orders_history.html">History</a>
    · <button class="btn" id="mockLogin">Mock Login</button>
    <button class="btn" id="logout">Logout</button>
  </div>

  <script>
    (function(){
      localStorage.removeItem('tempSetPassToken');
      localStorage.removeItem('setPasswordNext');
      if((window.__APP_CONFIG__||{}).NODE_ENV !== 'production'){
        const dm=document.getElementById('devMenu');
        if(dm) dm.style.display='block';
        document.getElementById('mockLogin')?.addEventListener('click',()=>{localStorage.setItem('authToken','dev-token');alert('Mock token set');});
        document.getElementById('logout')?.addEventListener('click',()=>{localStorage.removeItem('authToken');alert('Token removed');});
      }
    })();
  </script>

  <script>
    const { API_BASE_URL } = window.__APP_CONFIG__||{};
    const phoneEl = document.getElementById('phone');
    const stepPwd  = document.getElementById('step-password');
    const stepOtp  = document.getElementById('step-otp');
    const btnNext  = document.getElementById('btnNext');

    document.getElementById('driverBtn').onclick = ()=> location.href='/driver_app.html';
    document.getElementById('adminBtn').onclick = ()=> location.href='/admin_panel.html';

    btnNext.onclick = async ()=>{
      const phone = phoneEl.value.trim();
      if(!phone) return alert('اكتب رقم الهاتف');
      try{
        const r = await fetch(`${API_BASE_URL}/v1/auth/lookup?phone=${encodeURIComponent(phone)}`);
        const d = await r.json();
        if(!r.ok) throw new Error(d?.message||'فشل الاستعلام');
        if(d.exists){
          stepPwd.style.display='grid';
          stepOtp.style.display='none';
          document.getElementById('btnLogin').onclick = ()=> loginExisting(phone);
          document.getElementById('lnkForgot').onclick = ()=> forgotFlow(phone);
        }else{
          stepOtp.style.display='grid';
          stepPwd.style.display='none';
          const req = await fetch(`${API_BASE_URL}/v1/auth/otp/request`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ phone })});
          const payload = await req.json();
          if(!req.ok){ throw new Error(payload?.message||'تعذر إرسال الرمز'); }
          if(payload?.mock && payload?.code){ alert(`رمز تجريبي: ${payload.code}`); }
          document.getElementById('btnVerify').onclick = ()=> verifyNew(phone);
        }
      }catch(err){
        alert(err.message||'حدث خطأ');
      }
    };

    async function loginExisting(phone){
      const pass = document.getElementById('pwd').value;
      try{
        const r = await fetch(`${API_BASE_URL}/v1/auth/login`,{
          method:'POST',headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ phone, password: pass })
        });
        const d = await r.json();
        if(!r.ok) throw new Error(d?.message||'فشل الدخول');
        localStorage.setItem('authToken', d.token);
        location.href='/delivery_app.html';
      }catch(err){
        alert(err.message||'فشل الدخول');
      }
    }

    async function forgotFlow(phone){
      try{
        const res = await fetch(`${API_BASE_URL}/v1/auth/password/forgot`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ phone })});
        const info = await res.json();
        if(!res.ok){ throw new Error(info?.message||'تعذر إرسال الرمز'); }
        if(info?.mock && info?.code){ alert(`رمز تجريبي: ${info.code}`); }
        const code = prompt('أدخل رمز OTP المُرسل لاستعادة كلمة المرور:');
        if(!code) return;
        const np = prompt('أدخل كلمة مرور جديدة (6 أحرف على الأقل):');
        if(!np) return;
        const r = await fetch(`${API_BASE_URL}/v1/auth/password/reset`,{
          method:'POST',headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ phone, code, new_password: np })
        });
        const d = await r.json();
        if(!r.ok) throw new Error(d?.message||'فشل إعادة التعيين');
        localStorage.setItem('authToken', d.token);
        location.href='/delivery_app.html';
      }catch(err){
        alert(err.message||'فشل الإجراء');
      }
    }

    async function verifyNew(phone){
      const code = document.getElementById('otp').value.trim();
      try{
        const r = await fetch(`${API_BASE_URL}/v1/auth/otp/verify`,{
          method:'POST',headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ phone, code })
        });
        const d = await r.json();
        if(!r.ok) throw new Error(d?.message||'OTP غير صحيح');
        if(d?.temporary && d?.token){
          localStorage.setItem('tempSetPassToken', d.token);
          localStorage.setItem('setPasswordNext','/delivery_app.html');
          location.href='/set_password.html';
        }else if(d?.token){
          localStorage.setItem('authToken', d.token);
          location.href='/delivery_app.html';
        }else{
          throw new Error('استجابة غير متوقعة');
        }
      }catch(err){
        alert(err.message||'فشل التحقق');
      }
    }
  </script>
</body>
</html>
