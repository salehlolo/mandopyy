<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Waslny – تسجيل العملاء</title>
  <script src="/config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script defer src="/assets/js/ui.js"></script>
  <style>
    body { font-family: 'Tajawal', 'Inter', sans-serif; background-color: #f1f5f9; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">
  <div class="max-w-md w-full">
    <div class="bg-white rounded-3xl shadow-xl px-7 py-8 space-y-6">
      <div class="space-y-2 text-center">
        <div class="inline-flex items-center justify-center gap-2 text-blue-600">
          <i class="ph ph-map-trifold text-2xl"></i>
          <span class="text-sm font-semibold uppercase tracking-wide">Waslny</span>
        </div>
        <h1 id="form-title" class="text-2xl font-bold text-slate-800">مرحبًا بعودتك</h1>
        <p id="form-hint" class="text-sm text-slate-500">سجّل الدخول ببريدك الإلكتروني وكلمة المرور للمتابعة.</p>
      </div>

      <div id="form-alert" class="hidden text-sm font-medium px-4 py-3 rounded-2xl"></div>

      <div id="name-field" class="space-y-2 hidden">
        <label for="name-input" class="text-xs font-semibold text-slate-500">الاسم الكامل</label>
        <input id="name-input" class="w-full border border-slate-200 rounded-2xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder:text-slate-400" placeholder="مثال: أحمد محمد" autocomplete="name" />
      </div>

      <div class="space-y-2">
        <label for="email-input" class="text-xs font-semibold text-slate-500">البريد الإلكتروني</label>
        <input id="email-input" type="email" class="w-full border border-slate-200 rounded-2xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder:text-slate-400" placeholder="you@example.com" autocomplete="email" />
      </div>

      <div class="space-y-2">
        <label for="password-input" class="text-xs font-semibold text-slate-500">كلمة المرور</label>
        <input id="password-input" type="password" class="w-full border border-slate-200 rounded-2xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder:text-slate-400" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <button id="submit-btn" class="w-full inline-flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-2xl py-3 transition">
        <i class="ph ph-arrow-right"></i>
        <span>تسجيل الدخول</span>
      </button>

      <div class="text-center text-sm text-slate-500">
        <span id="toggle-message">ليس لديك حساب؟</span>
        <button id="toggle-mode" class="text-blue-600 font-semibold hover:text-blue-700">إنشاء حساب جديد</button>
      </div>

      <div class="grid gap-3">
        <button id="google-btn" class="w-full inline-flex items-center justify-center gap-3 border border-slate-200 rounded-2xl py-3 text-sm font-semibold text-slate-700 hover:bg-slate-50 transition">
          <i class="ph ph-google-logo"></i>
          <span>الدخول عبر Google</span>
        </button>
        <button id="facebook-btn" class="w-full inline-flex items-center justify-center gap-3 border border-slate-200 rounded-2xl py-3 text-sm font-semibold text-slate-700 hover:bg-slate-50 transition">
          <i class="ph ph-facebook-logo"></i>
          <span>الدخول عبر Facebook</span>
        </button>
      </div>

      <div class="grid grid-cols-2 gap-3 pt-2">
        <button id="driver-btn" class="inline-flex items-center justify-center gap-2 border border-blue-200 text-blue-600 rounded-2xl py-2 text-sm font-semibold hover:bg-blue-50 transition">
          <i class="ph ph-steering-wheel"></i>
          <span>أنا مندوب</span>
        </button>
        <button id="admin-btn" class="inline-flex items-center justify-center gap-2 border border-blue-200 text-blue-600 rounded-2xl py-2 text-sm font-semibold hover:bg-blue-50 transition">
          <i class="ph ph-shield"></i>
          <span>لوحة المشرف</span>
        </button>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const { API_BASE_URL } = window.__APP_CONFIG__ || {};
      const alertBox = document.getElementById('form-alert');
      const submitBtn = document.getElementById('submit-btn');
      const toggleModeBtn = document.getElementById('toggle-mode');
      const toggleMessage = document.getElementById('toggle-message');
      const nameField = document.getElementById('name-field');
      const nameInput = document.getElementById('name-input');
      const emailInput = document.getElementById('email-input');
      const passwordInput = document.getElementById('password-input');
      const formTitle = document.getElementById('form-title');
      const formHint = document.getElementById('form-hint');
      const googleBtn = document.getElementById('google-btn');
      const facebookBtn = document.getElementById('facebook-btn');
      const driverBtn = document.getElementById('driver-btn');
      const adminBtn = document.getElementById('admin-btn');

      let mode = 'login';

      function setAlert(message, type = 'error') {
        if (!message) {
          alertBox.classList.add('hidden');
          alertBox.textContent = '';
          return;
        }
        alertBox.textContent = message;
        alertBox.className = `text-sm font-medium px-4 py-3 rounded-2xl ${
          type === 'success' ? 'bg-emerald-50 text-emerald-600 border border-emerald-100' : 'bg-rose-50 text-rose-600 border border-rose-100'
        }`;
        alertBox.classList.remove('hidden');
      }

      function updateMode(nextMode) {
        mode = nextMode;
        if (mode === 'register') {
          formTitle.textContent = 'إنشاء حساب جديد';
          formHint.textContent = 'أدخل اسمك وبريدك الإلكتروني وكلمة المرور للبدء في طلب المندوب.';
          submitBtn.innerHTML = '<i class="ph ph-user-plus"></i><span>إنشاء حساب</span>';
          toggleMessage.textContent = 'لدي حساب مسبقًا؟';
          toggleModeBtn.textContent = 'تسجيل الدخول';
          nameField.classList.remove('hidden');
          passwordInput.autocomplete = 'new-password';
        } else {
          formTitle.textContent = 'مرحبًا بعودتك';
          formHint.textContent = 'سجّل الدخول ببريدك الإلكتروني وكلمة المرور للمتابعة.';
          submitBtn.innerHTML = '<i class="ph ph-arrow-right"></i><span>تسجيل الدخول</span>';
          toggleMessage.textContent = 'ليس لديك حساب؟';
          toggleModeBtn.textContent = 'إنشاء حساب جديد';
          nameField.classList.add('hidden');
          passwordInput.autocomplete = 'current-password';
        }
        setAlert('');
      }

      async function submitForm() {
        try {
          if (!API_BASE_URL) {
            throw new Error('لم يتم ضبط مسار الخادم.');
          }
          const email = (emailInput.value || '').trim().toLowerCase();
          const password = passwordInput.value || '';
          if (!email || !password) {
            throw new Error('الرجاء إدخال البريد الإلكتروني وكلمة المرور.');
          }
          submitBtn.disabled = true;
          submitBtn.classList.add('opacity-60', 'cursor-not-allowed');
          const payload = { email, password };
          if (mode === 'register') {
            payload.name = (nameInput.value || '').trim();
            if (!payload.name) {
              throw new Error('الرجاء إدخال الاسم الكامل.');
            }
          }
          const endpoint = mode === 'register' ? '/v1/auth/register' : '/v1/auth/login';
          const response = await fetch(`${API_BASE_URL}${endpoint}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          const data = await response.json();
          if (!response.ok) {
            throw new Error(data?.message || 'تعذر إتمام العملية.');
          }
          if (data?.token) {
            localStorage.setItem('authToken', data.token);
            setAlert('تم تسجيل الدخول بنجاح، سيتم تحويلك الآن...', 'success');
            setTimeout(() => {
              window.location.href = '/delivery_app.html';
            }, 600);
          } else {
            throw new Error('استجابة غير متوقعة من الخادم.');
          }
        } catch (error) {
          setAlert(error.message || 'حدث خطأ غير متوقع.');
        } finally {
          submitBtn.disabled = false;
          submitBtn.classList.remove('opacity-60', 'cursor-not-allowed');
        }
      }

      toggleModeBtn.addEventListener('click', () => {
        updateMode(mode === 'login' ? 'register' : 'login');
      });

      submitBtn.addEventListener('click', submitForm);
      passwordInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          submitForm();
        }
      });

      googleBtn.addEventListener('click', () => {
        window.location.href = '/v1/auth/google';
      });
      facebookBtn.addEventListener('click', () => {
        window.location.href = '/v1/auth/facebook';
      });
      driverBtn.addEventListener('click', () => {
        window.location.href = '/driver_app.html';
      });
      adminBtn.addEventListener('click', () => {
        window.location.href = '/admin_panel.html';
      });

      if (location.hash.startsWith('#token=')) {
        const token = decodeURIComponent(location.hash.slice(7));
        if (token) {
          localStorage.setItem('authToken', token);
          window.location.replace('/delivery_app.html');
          return;
        }
      }

      updateMode(mode);
    });
  </script>
</body>
</html>
