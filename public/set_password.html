<!doctype html><html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>MANDUBO – إنشاء كلمة المرور</title>
<script src="/config.js"></script>
<script src="/assets/js/i18n.js"></script>
<style>
:root{--brand:#0F73FF;--brand-600:#0d63dd}
.page{max-width:460px;margin:28px auto;padding:16px;background:#fff;border:1px solid #eee;border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,.04)}
.h{color:var(--brand);text-align:center;margin:0 0 8px;font-weight:800}
.label{font-size:14px;color:#374151;margin:8px 0 6px}
.input{width:100%;border:1px solid #e5e7eb;border-radius:12px;padding:12px 14px;font-size:16px}
.pw{position:relative}
.eye{position:absolute;inset-inline-end:10px;top:50%;transform:translateY(-50%);background:none;border:0;cursor:pointer;font-size:13px;color:#6b7280}
.meter{height:8px;border-radius:999px;background:#e5e7eb;overflow:hidden}
.meter>div{height:100%;width:0;background:#ef4444;transition:width .25s, background .25s}
.btn{width:100%;padding:12px 14px;border-radius:12px;border:1px solid #e5e7eb;background:#fff;color:#1f2937;font-size:16px;margin-top:12px}
.btn-brand{background:var(--brand);border-color:var(--brand);color:#fff}
.btn-brand:hover{background:var(--brand-600)}
.hint{font-size:12px;color:#6b7280;margin-top:6px}
</style>
</head>
<body>
<script>i18n.init();document.title=`MANDUBO – ${i18n.t('create_password')}`;</script>
<main class="page">
  <h2 class="h" data-i18n="create_password">إنشاء كلمة المرور</h2>

  <label class="label" data-i18n="new_password">كلمة مرور جديدة</label>
  <div class="pw">
    <input id="p1" class="input" type="password" autocomplete="new-password" inputmode="text" />
    <button class="eye" type="button" onclick="toggle('p1')">إظهار</button>
  </div>
  <div class="meter" aria-hidden="true"><div id="mbar"></div></div>
  <div class="hint" id="mtext">ضعيفة</div>

  <label class="label" data-i18n="confirm_password">تأكيد كلمة المرور</label>
  <div class="pw">
    <input id="p2" class="input" type="password" autocomplete="new-password" />
    <button class="eye" type="button" onclick="toggle('p2')">إظهار</button>
  </div>

  <button id="save" class="btn btn-brand" data-i18n="create_password">إنشاء كلمة المرور</button>
</main>

<script>
const { API_BASE_URL } = window.__APP_CONFIG__||{};
const t = localStorage.getItem('tempSetPassToken'); if(!t){ location.href='/index.html'; }

i18n.apply();

function toggle(id){ const el=document.getElementById(id); el.type = (el.type==='password'?'text':'password'); }

function score(s){
  let n=0; if(s.length>=8) n++; if(/[A-Z]/.test(s)) n++; if(/[a-z]/.test(s)) n++; if(/\d/.test(s)) n++; if(/[^\w\s]/.test(s)) n++;
  return Math.min(n,5);
}

p1.oninput = () => {
  const sc = score(p1.value);
  const bar = document.getElementById('mbar'); const txt = document.getElementById('mtext');
  bar.style.width = (sc*20)+'%';
  bar.style.background = ['#ef4444','#f59e0b','#f59e0b','#10b981','#10b981'][sc-1] || '#ef4444';
  const labels = {
    ar: ['ضعيفة','ضعيفة','متوسطة','قوية','قوية'],
    en: ['Weak','Weak','Medium','Strong','Strong']
  };
  const lang = (window.i18n?.get && window.i18n.get()) || 'ar';
  const list = labels[lang] || labels.ar;
  const idx = Math.max(0, Math.min(sc-1, list.length-1));
  txt.textContent = list[idx];
};

document.getElementById('save').onclick = async ()=>{
  const a=p1.value.trim(), b=p2.value.trim();
  if(a.length<6 || a!==b) return alert('تحقق من كلمة المرور');
  const r = await fetch(`${API_BASE_URL}/v1/auth/password/set`,{
    method:'POST', headers:{'Content-Type':'application/json', Authorization:`Bearer ${t}`},
    body: JSON.stringify({ password: a })
  });
  const d = await r.json();
  if(!r.ok) return alert(d.message||'فشل الحفظ');
  localStorage.removeItem('tempSetPassToken');
  localStorage.setItem('authToken', d.token);
  location.href='/delivery_app.html';
};

p1.oninput();
</script>
</body></html>
