<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MANDUBO – إنشاء كلمة المرور</title>
  <style>
    :root{--brand:#0F73FF;--brand-600:#0d63dd;}
    body{font-family:"Tajawal",system-ui,-apple-system,"Segoe UI",sans-serif;background:#f3f5f9;margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
    main{background:#fff;max-width:420px;width:100%;padding:28px;border-radius:20px;box-shadow:0 18px 48px rgba(15,115,255,0.08);}
    h2{margin:0 0 12px;color:var(--brand);}
    p{margin:0 0 18px;color:#5b6574;font-size:14px;}
    .input{width:100%;padding:12px 14px;border-radius:12px;border:1px solid #d0d7e2;font-size:15px;box-sizing:border-box;margin-bottom:12px;}
    .input:focus{outline:2px solid rgba(15,115,255,0.35);outline-offset:1px;}
    .btn{width:100%;padding:12px 14px;border-radius:12px;font-size:15px;font-weight:600;border:1px solid var(--brand);background:var(--brand);color:#fff;cursor:pointer;transition:background .2s ease;}
    .btn:hover{background:var(--brand-600);}  
  </style>
  <script src="/config.js"></script>
</head>
<body>
  <main>
    <h2 class="brand">إنشاء كلمة المرور</h2>
    <p>أدخل كلمة المرور ثم التأكيد لإكمال التسجيل.</p>
    <input id="p1" type="password" placeholder="كلمة المرور" class="input" autocomplete="new-password" />
    <input id="p2" type="password" placeholder="تأكيد كلمة المرور" class="input" autocomplete="new-password" />
    <button id="save" class="btn">اطلب مندوب</button>
  </main>

  <script>
    const { API_BASE_URL } = window.__APP_CONFIG__||{};
    const token = localStorage.getItem('tempSetPassToken');
    if(!token){ location.href='/index.html'; }

    document.getElementById('save').onclick = async ()=>{
      const a = document.getElementById('p1').value.trim();
      const b = document.getElementById('p2').value.trim();
      if(a.length<6 || a!==b){ return alert('تحقق من كلمة المرور'); }
      try{
    const r = await fetch(`${API_BASE_URL}/v1/auth/password/set`,{
      method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`},
      body: JSON.stringify({ password: a })
    });
    const d = await r.json();
    if(!r.ok) throw new Error(d?.message||'فشل الحفظ');
    localStorage.removeItem('tempSetPassToken');
        if(d?.token){ localStorage.setItem('authToken', d.token); }
        const next = localStorage.getItem('setPasswordNext') || '/delivery_app.html';
        localStorage.removeItem('setPasswordNext');
        location.href = next;
      }catch(err){
        alert(err.message||'حدث خطأ أثناء الحفظ');
      }
    };
  </script>
</body>
</html>
